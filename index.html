<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI音声受付システム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    background: #f0f4f8;
    color: #1a2332;
    min-height: 100vh;
  }

  /* ===== TABS ===== */
  .tab-bar {
    display: flex;
    background: #1a2332;
    padding: 0 24px;
    gap: 4px;
  }
  .tab-btn {
    padding: 14px 22px;
    background: none;
    border: none;
    color: #8a9ab0;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tab-btn.active {
    color: #fff;
    border-bottom-color: #4a9eff;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ===== RECEPTION TAB ===== */
  .reception-wrap {
    max-width: 680px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .status-card {
    background: #fff;
    border-radius: 16px;
    padding: 36px;
    text-align: center;
    box-shadow: 0 2px 20px rgba(0,0,0,0.07);
    margin-bottom: 24px;
  }

  .mic-btn {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: none;
    background: #4a9eff;
    color: #fff;
    font-size: 32px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(74,158,255,0.35);
  }
  .mic-btn:hover { transform: scale(1.05); background: #2d87f0; }
  .mic-btn.recording {
    background: #e8394a;
    animation: pulse 1.2s infinite;
    box-shadow: 0 4px 20px rgba(232,57,74,0.4);
  }
  .mic-btn.disabled { background: #c0cbd8; cursor: not-allowed; box-shadow: none; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .status-label {
    font-size: 14px;
    color: #6b7a8f;
    margin-top: 8px;
  }
  .status-label.active-text { color: #e8394a; font-weight: 600; }

  /* transcript / answer */
  .bubble-wrap { margin-bottom: 16px; }
  .bubble {
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 10px;
    font-size: 14px;
    line-height: 1.6;
  }
  .bubble-user {
    background: #eaf3ff;
    border-left: 3px solid #4a9eff;
  }
  .bubble-ai {
    background: #f0faf4;
    border-left: 3px solid #34c26e;
  }
  .bubble-unknown {
    background: #fff8ec;
    border-left: 3px solid #f5a623;
  }
  .bubble-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    color: #8a9ab0;
  }

  .speak-btn {
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid #4a9eff;
    background: none;
    color: #4a9eff;
    cursor: pointer;
    margin-top: 8px;
    font-family: inherit;
  }
  .speak-btn:hover { background: #eaf3ff; }

  /* ===== LOG TAB ===== */
  .log-wrap {
    max-width: 800px;
    margin: 32px auto;
    padding: 0 20px;
  }
  .section-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    color: #1a2332;
  }
  .log-empty {
    background: #fff;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    color: #8a9ab0;
    font-size: 14px;
  }
  .log-item {
    background: #fff;
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 12px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }
  .log-q { font-size: 14px; color: #1a2332; margin-bottom: 4px; }
  .log-time { font-size: 11px; color: #a0aab8; }
  .log-action-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: none;
    background: #4a9eff;
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
  }
  .log-action-btn:hover { background: #2d87f0; }
  .log-copy-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid #f5a623;
    background: none;
    color: #f5a623;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
  }
  .log-copy-btn:hover { background: #fff8ec; }

  /* ===== FAQ TAB ===== */
  .faq-wrap {
    max-width: 800px;
    margin: 32px auto;
    padding: 0 20px;
  }
  .faq-add-card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  }
  .faq-add-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: #3a4a5c; }
  .faq-input {
    width: 100%;
    border: 1px solid #dde4ee;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 10px;
    color: #1a2332;
  }
  .faq-input:focus { outline: none; border-color: #4a9eff; }
  textarea.faq-input { resize: vertical; min-height: 80px; }
  .faq-add-btn {
    padding: 8px 22px;
    background: #34c26e;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .faq-add-btn:hover { background: #27a85a; }

  .faq-list-item {
    background: #fff;
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 10px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }
  .faq-q { font-size: 13px; font-weight: 700; color: #1a2332; margin-bottom: 4px; }
  .faq-a { font-size: 13px; color: #4a5568; line-height: 1.5; }
  .faq-del-btn {
    background: none;
    border: 1px solid #e8394a;
    color: #e8394a;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
  }

  /* modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #fff;
    border-radius: 16px;
    padding: 28px;
    width: 90%;
    max-width: 480px;
  }
  .modal-box h3 { font-size: 16px; margin-bottom: 6px; }
  .modal-box p { font-size: 13px; color: #6b7a8f; margin-bottom: 16px; }
  .modal-q { background: #eaf3ff; border-radius: 8px; padding: 12px; font-size: 14px; margin-bottom: 16px; }
  .modal-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
  .modal-cancel { padding: 8px 18px; border-radius: 8px; border: 1px solid #dde4ee; background: none; font-size: 13px; cursor: pointer; font-family: inherit; }
  .modal-save { padding: 8px 18px; border-radius: 8px; border: none; background: #34c26e; color: #fff; font-size: 13px; cursor: pointer; font-family: inherit; }

  .thinking { font-size: 13px; color: #8a9ab0; padding: 12px 0; }

  /* text input */
  .text-input-wrap {
    background: #fff;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.07);
    margin-bottom: 24px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .text-input-field {
    flex: 1;
    border: 1px solid #dde4ee;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    color: #1a2332;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
  }
  .text-input-field:focus { outline: none; border-color: #4a9eff; }
  .text-send-btn {
    padding: 10px 20px;
    background: #4a9eff;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    height: 44px;
  }
  .text-send-btn:hover { background: #2d87f0; }
  .text-send-btn:disabled { background: #c0cbd8; cursor: not-allowed; }

  .input-mode-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    justify-content: center;
  }
  .mode-btn {
    padding: 6px 18px;
    border-radius: 20px;
    border: 1px solid #dde4ee;
    background: #fff;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    color: #6b7a8f;
    transition: all 0.15s;
  }
  .mode-btn.active {
    background: #4a9eff;
    border-color: #4a9eff;
    color: #fff;
  }

  /* csv upload */
  .csv-upload-area {
    border: 2px dashed #dde4ee;
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #fafbfc;
    margin-bottom: 16px;
  }
  .csv-upload-area:hover, .csv-upload-area.dragover {
    border-color: #4a9eff;
    background: #eaf3ff;
  }
  .csv-upload-icon { font-size: 28px; margin-bottom: 8px; }
  .csv-upload-label { font-size: 13px; color: #6b7a8f; line-height: 1.6; }
  .csv-upload-label span { color: #4a9eff; font-weight: 700; }
  .csv-btn-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .csv-dl-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid #4a9eff;
    background: none;
    color: #4a9eff;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .csv-dl-btn:hover { background: #eaf3ff; }
  .csv-clear-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid #e8394a;
    background: none;
    color: #e8394a;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .csv-clear-btn:hover { background: #fff5f5; }
  .csv-result {
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 8px;
    margin-bottom: 12px;
    display: none;
  }
  .csv-result.success { background: #f0faf4; color: #27a85a; }
  .csv-result.error { background: #fff5f5; color: #e8394a; }

  /* badge */
  .badge {
    display: inline-block;
    background: #e8394a;
    color: #fff;
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    margin-left: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="reception">📞 受付</button>
  <button class="tab-btn" data-tab="log" id="log-tab-btn">📋 未回答ログ</button>
  <button class="tab-btn" data-tab="faq">📝 固有情報管理</button>
</div>

<!-- 受付タブ -->
<div id="tab-reception" class="tab-content active">
  <div class="reception-wrap">
    <div class="status-card">
      <div class="input-mode-toggle">
        <button class="mode-btn active" id="modeVoice" onclick="setMode('voice')">🎤 音声入力</button>
        <button class="mode-btn" id="modeText" onclick="setMode('text')">⌨️ テキスト入力</button>
      </div>
      <div id="voiceArea">
        <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
        <div class="status-label" id="statusLabel">ボタンを押して話しかけてください</div>
      </div>
      <div id="textArea" style="display:none; width:100%;">
        <div class="text-input-wrap">
          <textarea class="text-input-field" id="textInput" placeholder="質問を入力してください…" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendText();}"></textarea>
          <button class="text-send-btn" id="textSendBtn" onclick="sendText()">送信</button>
        </div>
      </div>
    </div>

    <div class="bubble-wrap" id="bubbleWrap"></div>
  </div>
</div>

<!-- 未回答ログタブ -->
<div id="tab-log" class="tab-content">
  <div class="log-wrap">
    <div class="section-title">未回答の質問ログ</div>
    <div id="logList"><div class="log-empty">未回答の質問はまだありません</div></div>
  </div>
</div>

<!-- FAQ管理タブ -->
<div id="tab-faq" class="tab-content">
  <div class="faq-wrap">

    <!-- CSVアップロード -->
    <div class="faq-add-card">
      <h3>📂 CSVで一括取り込み</h3>
      <div class="csv-btn-row">
        <button class="csv-dl-btn" onclick="downloadTemplate()">⬇️ テンプレートをダウンロード</button>
        <button class="csv-clear-btn" onclick="clearAllFaqs()">🗑 全件クリア</button>
      </div>
      <div class="csv-upload-area" id="csvDropArea"
        onclick="document.getElementById('csvFileInput').click()"
        ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <div class="csv-upload-icon">📄</div>
        <div class="csv-upload-label">
          <span>クリックまたはドラッグ＆ドロップ</span>でCSVを読み込む<br>
          UTF-8形式のCSVファイル（項目名,内容）
        </div>
      </div>
      <input type="file" id="csvFileInput" accept=".csv" style="display:none" onchange="onFileSelect(event)">
      <div class="csv-result" id="csvResult"></div>
    </div>

    <!-- 手動追加 -->
    <div class="faq-add-card">
      <h3>➕ 手動で追加</h3>
      <input class="faq-input" id="newQ" placeholder="項目名（例：診察時間、電話番号）">
      <textarea class="faq-input" id="newA" placeholder="内容（例：平日9:00〜18:00、土曜9:00〜13:00）"></textarea>
      <button class="faq-add-btn" onclick="addFaq()">追加する</button>
    </div>

    <div class="section-title">登録済み固有情報</div>
    <div id="faqList"></div>
  </div>
</div>

<!-- モーダル：FAQ登録促進 -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3>📝 FAQに追加しますか？</h3>
    <p>この質問への回答を登録しておくと、次回から自動で答えられます。</p>
    <div class="modal-q" id="modalQ"></div>
    <textarea class="faq-input" id="modalA" placeholder="回答を入力してください…"></textarea>
    <div class="modal-row">
      <button class="modal-cancel" onclick="closeModal()">あとで</button>
      <button class="modal-save" onclick="saveFromModal()">保存する</button>
    </div>
  </div>
</div>

<script>
// ====== STATE ======
let faqs = [
  { q: "電話番号", a: "000-000-0000" },
  { q: "住所", a: "〇〇県〇〇市〇〇町1-1" },
  { q: "診察時間", a: "平日9:00〜18:00、土曜9:00〜13:00、日祝休診" },
  { q: "診療科目", a: "内科・整形外科・放射線科" },
  { q: "駐車場", a: "建物横に無料駐車場20台あり" },
];
let unknownLogs = [];
let pendingUnknownQ = "";
let isRecording = false;
let recognition = null;

// ====== TAB ======
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'faq') renderFaqList();
  if (name === 'log') renderLogList();
}

// タブボタンにイベントリスナーを設定（末尾で直接実行）

// ====== MIC ======
// ====== MODE ======
let inputMode = 'voice';
function setMode(mode) {
  inputMode = mode;
  document.getElementById('modeVoice').classList.toggle('active', mode === 'voice');
  document.getElementById('modeText').classList.toggle('active', mode === 'text');
  document.getElementById('voiceArea').style.display = mode === 'voice' ? 'block' : 'none';
  document.getElementById('textArea').style.display = mode === 'text' ? 'block' : 'none';
  if (mode === 'voice') setStatus('ボタンを押して話しかけてください');
}

function sendText() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  handleUserInput(text);
}

function toggleMic() {
  if (isRecording) { stopRecording(); return; }
  startRecording();
}

function startRecording() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('このブラウザは音声認識に対応していません。Chrome/Edgeをお使いください。');
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent = '⏹';
    setStatus('🎙 聞いています…', true);
  };
  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    stopRecording();
    handleUserInput(text);
  };
  recognition.onerror = () => {
    stopRecording();
    setStatus('音声認識に失敗しました。もう一度お試しください。');
  };
  recognition.onend = () => { if (isRecording) stopRecording(); };
  recognition.start();
}

function stopRecording() {
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micBtn').textContent = '🎤';
  if (recognition) recognition.stop();
}

function setStatus(msg, active = false) {
  const el = document.getElementById('statusLabel');
  el.textContent = msg;
  el.className = 'status-label' + (active ? ' active-text' : '');
}

// ====== MAIN FLOW ======
async function handleUserInput(text) {
  addBubble('user', text);
  setStatus('考え中…');
  disableMic(true);

  // thinking indicator
  const thinkingId = addThinking();

  const faqContext = faqs.map((f, i) => `${i+1}. Q: ${f.q}\n   A: ${f.a}`).join('\n');

  const systemPrompt = `あなたはクリニックのAI電話受付スタッフです。
患者さんからの質問に、丁寧・簡潔な日本語で答えてください。

【クリニック固有情報】
${faqContext}

【ルール】
- 上記の固有情報に関する質問は必ずその内容をベースに答える
- 一般的な医療・受診に関する質問（持ち物・初診の流れ・保険証・薬の飲み方など）はClaudeの知識で丁寧に答える
- クリニック固有の情報が不明な場合（担当医名・個別の料金など）は「担当スタッフに確認の上、折り返しご連絡いたします」と伝える
- 回答の最後に必ず「他にご質問はありますか？」を付ける
- 答えられない場合はJSON形式で {"unknown": true, "message": "..."} を返す（それ以外はテキストのみ）
- 回答は2〜3文程度で簡潔に`;

  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": "sk-ant-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", "anthropic-version": "2023-06-01" },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: text }]
      })
    });
    const data = await resp.json();
    removeThinking(thinkingId);

    const raw = data.content?.[0]?.text || "";
    let isUnknown = false;
    let displayText = raw;

    try {
      const parsed = JSON.parse(raw);
      if (parsed.unknown) { isUnknown = true; displayText = parsed.message; }
    } catch {}

    if (isUnknown) {
      addBubble('unknown', displayText);
      logUnknown(text);
      speak(displayText);
      setStatus('未回答の質問をログに保存しました');
      promptAddFaq(text);
    } else {
      addBubble('ai', displayText);
      speak(displayText);
      setStatus('ボタンを押して話しかけてください');
    }
  } catch(e) {
    removeThinking(thinkingId);
    addBubble('unknown', '通信エラーが発生しました。もう一度お試しください。');
    setStatus('エラーが発生しました');
  }

  disableMic(false);
}

// ====== BUBBLES ======
function addBubble(type, text) {
  const wrap = document.getElementById('bubbleWrap');
  const div = document.createElement('div');
  const labels = { user: '患者', ai: 'AI受付', unknown: 'AI受付（要確認）' };
  const typeClass = type === 'unknown' ? 'bubble-unknown' : type === 'ai' ? 'bubble-ai' : 'bubble-user';

  div.className = `bubble ${typeClass}`;
  div.innerHTML = `<div class="bubble-label">${labels[type]}</div>${escHtml(text)}`;

  if (type === 'ai' || type === 'unknown') {
    const br = document.createElement('br');
    div.appendChild(br);
    const speakBtn = document.createElement('button');
    speakBtn.className = 'speak-btn';
    speakBtn.textContent = '🔊 読み上げ';
    speakBtn.onclick = () => speak(text);
    div.appendChild(speakBtn);
  }
  if (type === 'unknown') {
    const copyBtn = document.createElement('button');
    copyBtn.className = 'speak-btn';
    copyBtn.style.marginLeft = '8px';
    copyBtn.style.borderColor = '#f5a623';
    copyBtn.style.color = '#f5a623';
    copyBtn.textContent = '📋 担当者に確認する';
    copyBtn.onclick = () => {
      const msg = `【AI受付：未回答の質問】\n\n「${text}」\n\nこの質問への回答を教えてください。\n回答いただいたら固有情報管理に追加します。`;
      navigator.clipboard.writeText(msg).then(() => {
        copyBtn.textContent = '✓ コピーしました';
        setTimeout(() => { copyBtn.textContent = '📋 担当者に確認する'; }, 2000);
      });
    };
    div.appendChild(copyBtn);
  }
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

let thinkingCounter = 0;
function addThinking() {
  const id = 'think-' + (++thinkingCounter);
  const wrap = document.getElementById('bubbleWrap');
  const div = document.createElement('div');
  div.id = id;
  div.className = 'thinking';
  div.textContent = '⏳ AIが回答を生成しています…';
  wrap.appendChild(div);
  return id;
}
function removeThinking(id) {
  document.getElementById(id)?.remove();
}

function disableMic(flag) {
  const btn = document.getElementById('micBtn');
  btn.classList.toggle('disabled', flag);
  btn.style.pointerEvents = flag ? 'none' : 'auto';
  const sendBtn = document.getElementById('textSendBtn');
  if (sendBtn) sendBtn.disabled = flag;
  const textInput = document.getElementById('textInput');
  if (textInput) textInput.disabled = flag;
}

// ====== TTS ======
function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 0.95;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ====== UNKNOWN LOG ======
function logUnknown(question) {
  unknownLogs.push({ q: question, time: new Date().toLocaleString('ja-JP') });
  updateLogBadge();
}
function updateLogBadge() {
  const btn = document.getElementById('log-tab-btn');
  const count = unknownLogs.length;
  btn.innerHTML = `📋 未回答ログ${count > 0 ? `<span class="badge">${count}</span>` : ''}`;
}

function renderLogList() {
  const el = document.getElementById('logList');
  if (unknownLogs.length === 0) {
    el.innerHTML = '<div class="log-empty">未回答の質問はまだありません 👍</div>';
    return;
  }
  el.innerHTML = unknownLogs.map((log, i) => `
    <div class="log-item">
      <div style="flex:1;">
        <div class="log-q">「${escHtml(log.q)}」</div>
        <div class="log-time">${log.time}</div>
        <div id="copy-msg-${i}" style="font-size:11px;color:#34c26e;margin-top:4px;display:none;">✓ コピーしました</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;">
        <button class="log-copy-btn" onclick="copyQuestion(${i})">📋 コピー</button>
        <button class="log-action-btn" onclick="promptAddFaqFromLog(${i})">回答を追加</button>
      </div>
    </div>
  `).join('');
}

function promptAddFaqFromLog(i) {
  pendingUnknownQ = unknownLogs[i].q;
  document.getElementById('modalQ').textContent = unknownLogs[i].q;
  document.getElementById('modalA').value = '';
  document.getElementById('modal').classList.add('show');
}

// ====== MODAL ======
function promptAddFaq(question) {
  pendingUnknownQ = question;
  document.getElementById('modalQ').textContent = question;
  document.getElementById('modalA').value = '';
  setTimeout(() => document.getElementById('modal').classList.add('show'), 800);
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function saveFromModal() {
  const answer = document.getElementById('modalA').value.trim();
  if (!answer) { alert('回答を入力してください'); return; }
  faqs.push({ q: pendingUnknownQ, a: answer });
  unknownLogs = unknownLogs.filter(l => l.q !== pendingUnknownQ);
  updateLogBadge();
  closeModal();
  renderFaqList();
  renderLogList();
  alert('FAQに追加しました！次回から自動で回答します。');
}

// ====== FAQ ======
function renderFaqList() {
  const el = document.getElementById('faqList');
  el.innerHTML = faqs.map((f, i) => `
    <div class="faq-list-item">
      <div>
        <div class="faq-q">Q: ${escHtml(f.q)}</div>
        <div class="faq-a">A: ${escHtml(f.a)}</div>
      </div>
      <button class="faq-del-btn" onclick="deleteFaq(${i})">削除</button>
    </div>
  `).join('');
}

function addFaq() {
  const q = document.getElementById('newQ').value.trim();
  const a = document.getElementById('newA').value.trim();
  if (!q || !a) { alert('質問と回答を両方入力してください'); return; }
  faqs.push({ q, a });
  document.getElementById('newQ').value = '';
  document.getElementById('newA').value = '';
  renderFaqList();
}

function deleteFaq(i) {
  if (!confirm('このFAQを削除しますか？')) return;
  faqs.splice(i, 1);
  renderFaqList();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ====== CSV ======
function downloadTemplate() {
  const rows = [
    ['項目名', '内容'],
    ['電話番号', '000-000-0000'],
    ['住所', '〇〇県〇〇市〇〇町1-1'],
    ['診察時間', '平日9:00〜18:00、土曜9:00〜13:00、日祝休診'],
    ['診療科目', '内科・整形外科・放射線科'],
    ['駐車場', '建物横に無料駐車場20台あり'],
    ['予約方法', 'お電話またはWebサイトからご予約ください'],
    ['担当医', ''],
    ['健診コース', ''],
    ['検査前注意事項', ''],
  ];
  const bom = '﻿';
  const csv = bom + rows.map(r => r.map(c => '"' + c.replace(/"/g, '""') + '"').join(',')).join('\r\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ai_reception_template.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function parseCsv(text) {
  // BOM除去
  text = text.replace(/^﻿/, '');
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const results = [];
  for (let i = 1; i < lines.length; i++) { // 1行目はヘッダーでスキップ
    const cols = [];
    let cur = '';
    let inQ = false;
    for (let j = 0; j < lines[i].length; j++) {
      const ch = lines[i][j];
      if (ch === '"' && !inQ) { inQ = true; continue; }
      if (ch === '"' && inQ) {
        if (lines[i][j+1] === '"') { cur += '"'; j++; }
        else inQ = false;
        continue;
      }
      if (ch === ',' && !inQ) { cols.push(cur); cur = ''; continue; }
      cur += ch;
    }
    cols.push(cur);
    const q = (cols[0] || '').trim();
    const a = (cols[1] || '').trim();
    if (q && a) results.push({ q, a });
  }
  return results;
}

function showCsvResult(msg, type) {
  const el = document.getElementById('csvResult');
  el.textContent = msg;
  el.className = 'csv-result ' + type;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function importCsv(text) {
  try {
    const items = parseCsv(text);
    if (items.length === 0) { showCsvResult('取り込めるデータがありませんでした。形式を確認してください。', 'error'); return; }
    // 既存と重複する項目名は上書き、新規は追加
    let added = 0, updated = 0;
    items.forEach(item => {
      const idx = faqs.findIndex(f => f.q === item.q);
      if (idx >= 0) { faqs[idx] = item; updated++; }
      else { faqs.push(item); added++; }
    });
    renderFaqList();
    showCsvResult(`✓ ${added}件追加・${updated}件更新しました`, 'success');
  } catch(e) {
    showCsvResult('読み込みエラーが発生しました。UTF-8形式のCSVか確認してください。', 'error');
  }
}

function onFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => importCsv(ev.target.result);
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
}

function onDragOver(e) {
  e.preventDefault();
  document.getElementById('csvDropArea').classList.add('dragover');
}
function onDragLeave(e) {
  document.getElementById('csvDropArea').classList.remove('dragover');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('csvDropArea').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (!file || !file.name.endsWith('.csv')) { showCsvResult('CSVファイルをドロップしてください', 'error'); return; }
  const reader = new FileReader();
  reader.onload = ev => importCsv(ev.target.result);
  reader.readAsText(file, 'UTF-8');
}

function clearAllFaqs() {
  if (!confirm('登録済みの固有情報を全件削除しますか？')) return;
  faqs = [];
  renderFaqList();
}

function copyQuestion(i) {
  const q = unknownLogs[i].q;
  const msg = `【AI受付：未回答の質問】\n\n「${q}」\n\nこの質問への回答を教えてください。\n回答いただいたら固有情報管理に追加します。`;
  navigator.clipboard.writeText(msg).then(() => {
    const el = document.getElementById('copy-msg-' + i);
    if (el) { el.style.display = 'block'; setTimeout(() => { el.style.display = 'none'; }, 2000); }
  });
}

// init
renderFaqList();
// タブボタンにイベントリスナーを設定
document.querySelectorAll('.tab-btn[data-tab]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    switchTab(this.getAttribute('data-tab'), this);
  });
});
</script>
